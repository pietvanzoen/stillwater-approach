name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Playdate SDK
        run: |
          SDK_VERSION="3.0.3"
          wget -q "https://download.panic.com/playdate_sdk/Linux/PlaydateSDK-${SDK_VERSION}.tar.gz"
          tar -xzf "PlaydateSDK-${SDK_VERSION}.tar.gz"
          SDK_DIR="PlaydateSDK-${SDK_VERSION}"
          echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/$SDK_DIR/bin" >> "$GITHUB_PATH"

      - name: Build
        run: pdc source/ stillwater-approach.pdx

      - name: Package
        run: zip -r "stillwater-approach-${{ github.ref_name }}.zip" stillwater-approach.pdx

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "stillwater-approach-${{ github.ref_name }}.zip"
          generate_release_notes: true
